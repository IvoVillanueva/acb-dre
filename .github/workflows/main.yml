name: Get 5 Mejores y 3 peores de la jornada

on:
  workflow_dispatch:
  schedule:
    # OCTUBRE a MARZO (UTC+1)
    - cron: '30 18-22 * 10-12,1-3 6'  # Sábados
    - cron: '30 12-22 * 10-12,1-3 0'  # Domingos
    # ABRIL a SEPTIEMBRE (UTC+2)
    - cron: '30 17-21 * 4-9 6'  # Sábados
    - cron: '30 11-21 * 4-9 0'  # Domingos

jobs:
  Get-Boxscore-ACB:
    name: Actualizar 5 Mejores y 3 peores de la jornada
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }} # Nota: GITHUB_TOKEN es suficiente para commits/push

    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: 'release'

      # ---- Dependencias del sistema (libcurl) ----
      - name: Install libcurl and libssl on Linux
        run: sudo apt-get -y install libcurl4-openssl-dev
        shell: bash

      # ---- Cache CRAN packages ----
      - name: Cache CRAN packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: ${{ runner.os }}-r-

      # ---- Instalación de paquetes R (Corregido) ----
      - name: Install CRAN and GitHub packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Paquetes CRAN (CORREGIDO: 'purr' a 'purrr')
          packages: >
            dplyr, readr, tidyr, stringr, janitor, purrr,
            lubridate, gt, gtExtras, webshot2
          # Paquetes de GitHub
          extra-packages: andreweatherman/gtUtils

      # ---- Ejecutar script principal ----
      - name: Run R script
        run: Rscript scripts/dre_top5.R
        shell: bash

      # ---- Commit automático (Añadido '|| true' para evitar fallos si no hay cambios) ----
      - name: Commit changes in data folder
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add png/*.png
          # Añadido '|| true' para que no falle si no hay imágenes que commitear
          git diff --cached --quiet || git commit -m "Auto-update: 5 Mejores y 3 Peores" || true
        shell: bash

      # ---- Push final ----
      - name: Push changes
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Usamos GITHUB_TOKEN para el push

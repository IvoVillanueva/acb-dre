name: Get 5 Mejores y 3 peores de la jornada

on:
  workflow_dispatch:
  schedule:
    # OCTUBRE a MARZO (UTC+1)
    - cron: '30 18-22 * 10-12,1-3 6'
    - cron: '30 12-22 * 10-12,1-3 0'

    # ABRIL a SEPTIEMBRE (UTC+2)
    - cron: '30 17-21 * 4-9 6'
    - cron: '30 11-21 * 4-9 0'

jobs:
  Get-Boxscore-ACB:
    name: Actualizar 5 Mejores y 3 Peores de la jornada 
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4  

      # ---- Instalar R ----
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # ---- Dependencias del sistema ----
      - name: Install system dependencies (Chromium + libcurl)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libcurl4-openssl-dev wget unzip

      # ---- Instalar Font Awesome 6 Brands ----
      # Descargamos el ZIP de la versión web oficial y extraemos solo las fuentes .woff2
      - name: Install Font Awesome 6 Brands
        run: |
          mkdir -p ~/.local/share/fonts/fa6
          wget -O fa6.zip https://use.fontawesome.com/releases/v6.5.2/fontawesome-free-6.5.2-web.zip
          unzip fa6.zip
          cp fontawesome-free-6.5.2-web/webfonts/fa-brands-400.woff2 ~/.local/share/fonts/fa6/
          fc-cache -f -v

      # ---- Configurar Chromium ----
      - name: Set Chromium Path
        run: echo "CHROME_BIN=/usr/bin/chromium-browser" >> $GITHUB_ENV

      # ---- Cache ligera de R (mucho más rápido) ----
      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/R
          key: ${{ runner.os }}-r-cache-${{ hashFiles('scripts/*.R') }}
          restore-keys: ${{ runner.os }}-r-cache-

      # ---- Instalar solo los paquetes necesarios ----
      - name: Install only needed R packages
        run: |
          Rscript -e 'pkgs <- c(
            "dplyr","readr","tidyr","stringr","janitor",
            "lubridate","glue","htmltools",
            "gt","gtExtras"
          );
          missing <- setdiff(pkgs, rownames(installed.packages()));
          if(length(missing)) install.packages(missing);'
          extra-packages: andreweatherman/gtUtils
      # ---- Ejecutar script ----
      - name: Run R script
        run: Rscript scripts/dre_top5.R

      # ---- Commit automático ----
      - name: Commit PNG updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add png/*.png
          git diff --cached --quiet || git commit -m "Auto-update: 5 Mejores y 3 Peores"

      # ---- Push ----
      - name: Push changes
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
